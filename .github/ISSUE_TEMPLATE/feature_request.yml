name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Start with the use case, not the proposed API.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional. A rough API or behavior sketch.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, other libraries, manual approaches.
